  source_gen: ^4.1.1
  build: ^4.0.3
  code_builder: ^4.10.0
  dart_style: ^3.1.3
  pub_semver: ^2.1.4

dev_dependencies:
  build_runner: ^2.13.1
  build_test: ^3.0.0
  test: ^1.25.0
