name: dart_desk_generator
description: Code generator for the Dart Desk CMS framework. Generates CMS configuration from annotations.
version: 0.1.0
homepage: https://github.com/vietthangvunguyen/dart_desk
repository: https://github.com/vietthangvunguyen/dart_desk
topics:
  - cms
  - code-generation
  - build-runner

environment:
  sdk: ^3.8.0

dependencies:
  dart_desk_annotation:
    git:
      url: https://github.com/ThangVuNguyenViet/dart_desk.git
      path: packages/dart_desk_annotation
  source_gen: ^4.1.1
  build: ^4.0.3
  code_builder: ^4.10.0
  dart_style: ^3.1.3
  pub_semver: ^2.1.4

dev_dependencies:
  build_runner: ^2.13.1
  build_test: ^3.5.4
