name: test

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'examples/**'
      - 'pubspec.yaml'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'examples/**'
      - 'pubspec.yaml'
      - '.github/workflows/test.yml'
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CACHE_PATHS: |
    /root/.pub-cache
    .dart_tool
    packages/dart_desk/.dart_tool
    packages/dart_desk_annotation/.dart_tool
    packages/dart_desk_widgets/.dart_tool
    packages/dart_desk_generator/.dart_tool
    examples/data_models/.dart_tool
    examples/desk_app/.dart_tool
    examples/example_app/.dart_tool

jobs:
  setup:
    name: workspace pub get
    runs-on: ubuntu-22.04-arm
    container:
      image: ghcr.io/cirruslabs/flutter:3.41.6
    outputs:
      cache-key: ${{ steps.key.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - id: key
        run: echo "value=pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock', '**/pubspec.yaml') }}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_PATHS }}
          key: ${{ steps.key.outputs.value }}
          restore-keys: pub-${{ runner.os }}-
      - run: flutter --suppress-analytics pub get

  check:
    needs: setup
    runs-on: ubuntu-22.04-arm
    container:
      image: ghcr.io/cirruslabs/flutter:3.41.6
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: analyze
            name: analyze
            command: flutter analyze packages/dart_desk examples/data_models examples/desk_app examples/example_app
            working-directory: .
            artifact-name: ''
            artifact-path: ''
          - id: data_models
            name: data_models tests
            command: flutter test --concurrency=4
            working-directory: examples/data_models
            artifact-name: ''
            artifact-path: ''
          - id: dart_desk
            name: dart_desk tests
            command: flutter test --concurrency=4
            working-directory: packages/dart_desk
            artifact-name: golden-failures-dart_desk
            artifact-path: packages/dart_desk/test/**/failures/**
          - id: desk_app
            name: desk_app screen goldens
            command: flutter test --concurrency=4 test/screens/
            working-directory: examples/desk_app
            artifact-name: golden-failures-desk_app
            artifact-path: examples/desk_app/test/**/failures/**
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_PATHS }}
          key: ${{ needs.setup.outputs.cache-key }}
      - run: flutter --suppress-analytics pub get
      - name: codegen (data_models)
        working-directory: examples/data_models
        run: dart run build_runner build
      - name: ${{ matrix.name }}
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.command }}
      - if: failure() && matrix.artifact-name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: ignore

  test:
    name: test
    needs: check
    runs-on: ubuntu-22.04-arm
    if: always()
    steps:
      - name: gate
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "One or more matrix legs failed."
            exit 1
          fi
