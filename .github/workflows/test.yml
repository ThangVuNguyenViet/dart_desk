name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    # Free 4-core runner for public repos. Requires "Larger runners" enabled
    # under repo Settings → Actions → Runners. Falls back to ubuntu-latest if
    # unavailable.
    runs-on: ubuntu-latest-4-cores
    # Pin to the same Flutter image local devs use for `make goldens`.
    # Linux runners + matching freetype/fontconfig keep golden pixels stable.
    container:
      image: ghcr.io/cirruslabs/flutter:3.41.6

    steps:
      - uses: actions/checkout@v4

      - name: cache pub + dart_tool
        uses: actions/cache@v4
        with:
          path: |
            /root/.pub-cache
            packages/dart_desk/.dart_tool
            packages/dart_desk_annotation/.dart_tool
            packages/dart_desk_widgets/.dart_tool
            packages/dart_desk_generator/.dart_tool
            examples/data_models/.dart_tool
            examples/desk_app/.dart_tool
            examples/example_app/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: flutter pub get
        run: flutter --suppress-analytics pub get
        working-directory: packages/dart_desk

      - name: analyze
        run: flutter analyze packages/dart_desk examples/data_models examples/desk_app examples/example_app

      - name: data_models — fixture round-trips
        run: flutter test --concurrency=4
        working-directory: examples/data_models

      - name: dart_desk — widget + golden tests
        run: flutter test --concurrency=4
        working-directory: packages/dart_desk

      - name: desk_app — screen goldens
        run: flutter test --concurrency=4 test/screens/
        working-directory: examples/desk_app

      - name: upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: |
            packages/dart_desk/test/**/failures/**
            examples/desk_app/test/**/failures/**
          if-no-files-found: ignore
