name: example
description: CMS studio app showcasing dart_desk document types.
publish_to: none
version: 1.1.0

environment:
  sdk: ^3.8.1

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  dart_desk:
    git:
      url: https://github.com/ThangVuNguyenViet/dart_desk.git
      path: packages/dart_desk
  example_app:
    git:
      url: https://github.com/ThangVuNguyenViet/dart_desk.git
      path: examples/example_app
  data_models:
    git:
      url: https://github.com/ThangVuNguyenViet/dart_desk.git
      path: examples/data_models
  cupertino_icons: ^1.0.8
  dart_mappable: ^4.6.1
  intl: ^0.20.2
  shadcn_ui: ^0.52.1
  serverpod_flutter: ^3.3.1
  http: ^1.2.0
  dart_desk_client:
    git:
      url: https://github.com/ThangVuNguyenViet/dart_desk_be.git
      path: dart_desk_client
  marionette_flutter: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  dart_mappable_builder: ^4.6.1
  # Used directly by integration_test/test_utils/test_app.dart for the
  # pre-authenticated client setup.
  serverpod_auth_idp_flutter: ^3.4.5
  # Screen-golden infrastructure (test/screens/).
  flutter_test_goldens: ^0.0.10
  get_it: ^9.2.1
  image: ^4.5.0
  irondash_message_channel: ^0.7.0
  shared_preferences: ^2.2.2
  super_native_extensions: ^0.9.0

flutter:
  uses-material-design: true
