name: dart_desk
description: "CMS studio interface with inputs, validators, and runtime components for Dart Desk applications"
version: 0.2.0
homepage: https://github.com/ThangVuNguyenViet/dart_desk
repository: https://github.com/ThangVuNguyenViet/dart_desk
issue_tracker: https://github.com/ThangVuNguyenViet/dart_desk/issues
topics:
  - desk
  - flutter
  - content-management

resolution: workspace
environment:
  sdk: ^3.8.0

dependencies:
  dart_desk_client: ^0.2.0
  dart_desk_annotation: ^0.2.0
  flutter:
    sdk: flutter
  shadcn_ui: ^0.52.1
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.0
  serverpod_flutter: ^3.4.5
  serverpod_auth_core_flutter: ^3.4.5
  serverpod_auth_idp_flutter: ^3.4.5
  signals: ^6.3.0
  flutter_resizable_container: ^4.2.0
  super_editor: 0.3.0-dev.50
  get_it: ^9.2.1
  auto_route: ^11.1.0
  font_awesome_flutter: ^10.8.0
  http: ^1.2.0
  collection: ^1.19.1
  meta: ^1.17.0
  crypto: ^3.0.6
  image: ^4.5.0
  image_picker_platform_interface: ^2.10.0
  plugin_platform_interface: ^2.1.8
  super_drag_and_drop: ^0.9.1
  responsive_framework: ^1.5.1
  dart_mappable: ^4.7.0
  mocktail: ^1.0.4
  flutter_colorpicker: ^1.1.0
  marionette_flutter: ^0.5.0
  uuid: ^4.5.3
  # Used by lib/src/testing/golden_bricks_theme.dart so consumers can opt their
  # apps into a deterministic-glyph theme for golden tests.
  golden_bricks: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  auto_route_generator: ^10.5.0
  flutter_test_goldens: ^0.0.10
  # Used by test/helpers/input_test_helpers.dart to stub native channels
  # for super_drag_and_drop in widget tests.
  irondash_message_channel: ^0.7.0
  super_native_extensions: ^0.9.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: lib/fonts/Inter-Variable.ttf
    - family: Manrope
      fonts:
        - asset: lib/fonts/Manrope-Variable.ttf
    - family: DM Sans
      fonts:
        - asset: lib/fonts/DMSans-Variable.ttf
    - family: Noto Serif
      fonts:
        - asset: lib/fonts/NotoSerif-Variable.ttf
    - family: Playfair Display
      fonts:
        - asset: lib/fonts/PlayfairDisplay-Variable.ttf
    - family: Cormorant Garamond
      fonts:
        - asset: lib/fonts/CormorantGaramond-Variable.ttf
    - family: DM Serif Display
      fonts:
        - asset: lib/fonts/DMSerifDisplay-Regular.ttf
