name: flutter_cms_workspace
description: "Flutter CMS monorepo workspace"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

# Workspace configuration
workspace:
  - packages/flutter_cms
  - packages/flutter_cms_annotation
  - packages/flutter_cms_generator

dependency_overrides:
  signals:
    git:
      url: https://github.com/rodydavis/signals.dart.git
      path: packages/signals
  signals_core:
    git:
      url: https://github.com/rodydavis/signals.dart.git
      path: packages/signals_core
  signals_flutter:
    git:
      url: https://github.com/rodydavis/signals.dart.git
      path: packages/signals_flutter
